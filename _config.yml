title: prompts
description: Reusable prompt templates for everyday work. Beginner + Power User.
url: ''
baseurl: ''
markdown: kramdown
permalink: pretty
collections:
  prompts:
    output: true
    permalink: /p/:slug/
  prompt_categories:
    output: true
    permalink: /c/:slug/
defaults:
- scope:
    path: assets
  values:
    layout: null
- scope:
    path: ''
    type: prompts
  values:
    layout: prompt
- scope:
    path: ''
    type: prompt_categories
  values:
    layout: category
- scope:
    path: ''
  values:
    layout: default
