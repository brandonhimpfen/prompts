- key: rewrite_pro
  slug: rewrite-professionally
  category: writing
  title: Rewrite this professionally
  description: Clean, confident, not robotic.
  output_type: Rewrite
  difficulty: Beginner + Power
  tags:
  - rewrite
  - professional
  - writing
  - email
  featured: true
  beginner: 'Rewrite this to sound professional, clear, and confident.

    Keep the meaning the same.


    Text:

    [paste here]'
  power: '<task>Rewrite the text for a professional context.</task>

    <context>Audience: coworkers or clients.</context>

    <constraints>

    - Keep original meaning

    - Make it concise

    - Remove emotional language

    - Avoid clichés

    </constraints>

    <output_format>

    1) Revised version

    2) 3 variants (short / neutral / warm)

    </output_format>

    <input>[paste here]</input>'
